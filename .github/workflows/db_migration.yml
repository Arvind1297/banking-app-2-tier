name: Initialization Database

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  init_db:
    runs-on: ubuntu-latest

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::514454346636:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Upload file on S3
        run: |
          aws s3 mb s3://514454346636-devops-scripts --region us-east-1 || echo "Bucket already exists"
          aws s3 cp init.sql s3://514454346636-devops-scripts/init.sql --region us-east-1
          aws s3 cp init.py s3://514454346636-devops-scripts/init.py --region us-east-1
          echo "✅ Files Uploaded to bucket......"
      - name: Initializing Database on RDS using EC2
        id: init
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws s3 cp s3://514454346636-devops-scripts/init.sql",
    
              "python3 /tmp/init.py" ,
              "rm -rf /tmp/init.sql /tmp/init.py"
            ]}' \
            --query 'Command.CommandId'
            --output text
            --region us-east-1)
          echo "cmd_id"=$"CMD_ID" >> $GITHUB_OUT  
      - name: Show Results
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id "${{steps.init_db.outputs.cmd_id}}" \
            --details \
            --region us-east-1 \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{steps.init_db.outputs.cmd_id}}" \
            --query 'CommandInvocations[*].Status' \
            --output text \
            --region us-east-1)

          if [[ "$FAILED" == "Failed" ]]; then
            echo "::error::Database Initialization Failed on RDS"
            exit 1
          else
            echo "✅ Database Initialized Successfully on RDS"
          fi