name: Test Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::514454346636:role/github-action-deploy-role
          aws-region: us-east-1

      - name: Verify AWS Identity
        run: |
          aws sts get-caller-identity

      - name: Check SSM Managed Instances
        run: |
          aws ssm describe-instance-information --output table

      - name: Send SSM Command
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["hostname -I"]}' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $CMD_ID"

          if [ -z "$CMD_ID" ] || [ "$CMD_ID" = "None" ]; then
            echo "SSM command was not created."
            exit 1
          fi

          echo "Waiting for command to complete..."
          sleep 20

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --output table

          echo "----- Command Output -----"

          aws ssm list-command-invocations \
            --command-id "$CMD_ID" \
            --details \
            --query "CommandInvocations[*].{Instance:InstanceId,Output:CommandPlugins[0].Output}" \
            --output table